<!DOCTYPE html>
<html lang="en" data-dbn-ready="0">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DBN Editor — Dodgeball Notation</title>
<meta name="description" content="Write a dodgeball play in DBN notation and watch it animate. Deep-linkable and agent-drivable.">
<style>
  :root { --bg:#0e1014; --panel:#16191f; --line:#2a2f3a; --text:#e6e8ec; --muted:#8b93a1; --us:#1f6feb; --err:#e5484d; --ok:#36b37e; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
  header { padding:14px 18px; border-bottom:1px solid var(--line); display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
  header h1 { font-size:16px; margin:0; font-weight:650; }
  header .sub { color:var(--muted); font-size:13px; }
  header a { color:var(--us); text-decoration:none; }
  main { display:grid; grid-template-columns: minmax(320px, 1fr) minmax(360px, 1.1fr); height:calc(100vh - 53px); }
  @media (max-width:760px){ main{ grid-template-columns:1fr; height:auto; } }
  .pane { display:flex; flex-direction:column; min-width:0; }
  .pane.edit { border-right:1px solid var(--line); }
  .toolbar { padding:8px 14px; border-bottom:1px solid var(--line); display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .toolbar label { color:var(--muted); font-size:13px; }
  select, button { background:var(--panel); color:var(--text); border:1px solid var(--line); border-radius:7px; padding:5px 10px; font:inherit; cursor:pointer; }
  button:hover, select:hover { border-color:var(--us); }
  textarea { flex:1; min-height:320px; resize:none; border:0; outline:0; padding:14px 16px; background:transparent; color:var(--text);
             font:13.5px/1.6 ui-monospace,SFMono-Regular,Menlo,monospace; tab-size:2; }
  .status { padding:8px 16px; border-top:1px solid var(--line); font:12.5px/1.4 ui-monospace,monospace; min-height:34px; }
  .status.ok { color:var(--ok); } .status.err { color:var(--err); }
  .error-panel { margin:0; padding:10px 16px; background:#2a1416; color:#ff9aa0; border-top:1px solid var(--err);
                 font:12.5px/1.45 ui-monospace,monospace; white-space:pre-wrap; }
  .preview-wrap { flex:1; overflow:auto; padding:18px; }
  .hint { color:var(--muted); font-size:12.5px; padding:12px 16px 8px; }
</style>
</head>
<body>
<header>
  <h1>DBN Editor</h1>
  <span class="sub">write a dodgeball play in <a href="NOTATION.md">DBN notation</a> → watch it animate ·
    <a href="GLOSSARY.md">glossary</a> · <a href="DRIVING.md">drive it programmatically</a> ·
    <a href="https://github.com/storypixel/dodgeball-play-notation">source</a></span>
</header>
<main>
  <section class="pane edit">
    <div class="toolbar">
      <label for="example-select">Example:</label>
      <select id="example-select" data-testid="example-select" aria-label="Load an example play">
        <option value="">— pick —</option>
        <option value="pitch-back">Pitch Back</option>
        <option value="kill-left">Kill Left</option>
        <option value="insides">Insides</option>
        <option value="double-team-4">Double-Team on 4</option>
        <option value="single-ball">Single Ball</option>
        <option value="away">Away</option>
        <option value="home">Home</option>
        <option value="green-light">Green Light</option>
        <option value="crash">Crash</option>
        <option value="middle-bait">Middle (bait)</option>
      </select>
      <button id="render-btn" data-testid="render-button" aria-label="Render the notation">Render ⌘↵</button>
      <label for="speed-select">Speed:</label>
      <select id="speed-select" data-testid="speed-select" aria-label="Animation speed">
        <option value="1">1×</option>
        <option value="2" selected>2× (default)</option>
        <option value="3">3×</option>
      </select>
    </div>
    <textarea id="dbn-input" data-testid="dbn-input" aria-label="DBN notation input"
      spellcheck="false" placeholder='[Play "My Play"]&#10;DBF "U:1c1*,... / T:1c10,..."&#10;&#10;1. {Set} U3?&#10;2. {Throw} U1@T3!'></textarea>
    <div id="status" class="status" data-testid="status" role="status" aria-live="polite">Loading…</div>
    <pre id="error-panel" class="error-panel" data-testid="error-panel" role="alert" hidden></pre>
  </section>
  <section class="pane">
    <div class="hint">Live preview — press play to animate.</div>
    <div class="preview-wrap"><div id="stage" data-testid="preview-stage"></div></div>
  </section>
</main>

<script src="vendor/play-animator.js"></script>
<script src="vendor/dbn.js"></script>
<script src="src/editor.js"></script>
</body>
</html>
